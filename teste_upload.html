<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste de Upload para AudiSped Backend</title>
    <style>
        body { font-family: sans-serif; padding: 2em; background-color: #f4f7f9; }
        h1 { color: #2c3e50; }
        form { background: white; padding: 2em; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input[type="file"] { display: block; margin-top: 1em; }
        button { background-color: #27ae60; color: white; border: none; padding: 10px 20px; font-size: 1em; border-radius: 5px; cursor: pointer; margin-top: 1.5em; }
        button:hover { background-color: #2ecc71; }
    </style>
</head>
<body>

    <h1>Teste de Upload para o Servidor AudiSped</h1>
    
    <form action="http://localhost:15435/api/upload" method="post" enctype="multipart/form-data">
        <p>
            <label for="spedfile"><strong>Selecione o arquivo SPED (.txt):</strong></label>
            <input type="file" id="spedfile" name="spedfile" accept=".txt" required>
        </p>
        <button type="submit">Enviar Arquivo para o Servidor</button>
    </form>

</body>
</html>
