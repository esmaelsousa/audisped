<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudiSped v3.5 - Plataforma de Auditoria Fiscal</title>
    <style>
        /* O CSS permanece o mesmo da v3.4 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f7f9; color: #333; }
        .main-container { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background-color: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h1 { font-size: 1.5em; text-align: center; margin-bottom: 30px; color: #ecf0f1; }
        .sidebar .menu-item { display: block; color: #ecf0f1; text-decoration: none; padding: 15px; margin: 5px 0; border-radius: 5px; transition: background-color 0.3s; }
        .sidebar .menu-item:hover, .sidebar .menu-item.active { background-color: #34495e; }
        .content { flex-grow: 1; padding: 30px; }
        .page { display: none; }
        .page.active { display: block; }
        .container { max-width: 1200px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2, h3 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        #file-input-container { padding: 20px; border: 2px dashed #3498db; border-radius: 5px; text-align: center; margin-bottom: 20px; background-color: #ecf0f1; }
        input[type="file"] { display: none; }
        .upload-label { cursor: pointer; display: inline-block; padding: 10px 20px; background-color: #3498db; color: white; border-radius: 5px; font-weight: bold; }
        .action-button { cursor: pointer; padding: 10px 20px; background-color: #27ae60; color: white; border-radius: 5px; font-weight: bold; border: none; font-size: 1em; margin-top: 15px; }
        .print-button { background-color: #9b59b6; }
        .action-button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .status { margin-top: 15px; font-size: 1.1em; padding: 10px; border-radius: 5px; background-color: #e8f4fd; border-left: 5px solid #3498db; }
        .dashboard { margin-top: 20px; border: 1px solid #ddd; border-radius: 5px; padding: 20px; background-color: #fdfdfd; display: none; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .dashboard-item { background: #ecf0f1; padding: 10px; border-radius: 4px; }
        .error-card, .warning-card, .info-card { border-left-width: 5px; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        .error-card { background: #fff1f1; border-color: #e74c3c; }
        .warning-card { background: #fef9e7; border-color: #f39c12; }
        .info-card { background: #e8f4fd; border-color: #3498db; }
        .title { font-weight: bold; font-size: 1.1em; }
        .error-title { color: #c0392b; } .warning-title { color: #d35400; } .info-title { color: #2980b9; }
        .details, .correction { margin-top: 5px; font-family: 'Courier New', Courier, monospace; font-size: 0.95em; background: #fdfdfd; padding: 8px; border-radius: 4px; border: 1px solid #ddd; word-wrap: break-word; }
        .correction { color: #27ae60; font-weight: bold; margin-top: 10px; }
        .raw-line-container { margin-top: 10px; padding: 10px; background-color: #2c3e50; color: #f1f1f1; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; border-radius: 4px; white-space: pre-wrap; word-break: break-all; }
        .highlight { background-color: #e74c3c; color: #fff; font-weight: bold; padding: 2px 4px; border-radius: 3px; }
        .accordion-header { background-color: #ecf0f1; padding: 15px; margin-top: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; border: 1px solid #bdc3c7; transition: background-color 0.3s; }
        .accordion-header:hover { background-color: #dfe6e9; }
        .accordion-header.error { border-left: 5px solid #e74c3c; }
        .accordion-header.warning { border-left: 5px solid #f39c12; }
        .accordion-details { padding: 10px; border: 1px solid #ddd; border-top: none; display: none; border-radius: 0 0 5px 5px; }
        @media print { /* Estilos de impressão permanecem os mesmos */ }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <h1>AudiSped v3.5</h1>
            <a href="#" class="menu-item active" onclick="showPage('analisador')">Analisador de Estrutura</a>
            <a href="#" class="menu-item" onclick="showPage('conciliador')">Conciliador de Documentos</a>
        </div>
        <div class="content">
            <div id="analisador" class="page active">
                <div class="container">
                    <h2>Analisador de Estrutura e Regras</h2>
                    <div id="file-input-container">
                        <label for="spedFileAnalisador" class="upload-label">Selecionar Arquivo SPED</label>
                        <input type="file" id="spedFileAnalisador" accept=".txt">
                        <div class="status" id="statusAnalisador">Aguardando arquivo...</div>
                    </div>
                    <div class="dashboard" id="dashboardAnalisador"></div>
                    <div id="action-buttons" style="text-align: center;">
                        <button class="action-button" id="analyzeButton" disabled>Analisar Arquivo</button>
                        <button class="action-button print-button" id="printButton" style="display: none;" onclick="window.print()">Imprimir Relatório</button>
                    </div>
                    <div id="summaryAnalisador"></div>
                    <div id="resultsAnalisador"></div>
                </div>
            </div>
            <div id="conciliador" class="page">
                <div class="container">
                     <h2>Conciliador de Documentos (SPED vs. SEFAZ)</h2>
                     <p>Funcionalidade em desenvolvimento.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LÓGICA DE NAVEGAÇÃO (v3.5) ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- LÓGICA DO ANALISADOR (v3.5 - REFATORADO) ---
        let fileLinesAnalisador = [];
        let validationRules = []; // Armazenará as regras carregadas do JSON
        const statusAnalisador = document.getElementById('statusAnalisador');
        const resultsAnalisador = document.getElementById('resultsAnalisador');
        const summaryAnalisador = document.getElementById('summaryAnalisador');
        const dashboardAnalisador = document.getElementById('dashboardAnalisador');
        const analyzeButton = document.getElementById('analyzeButton');
        const printButton = document.getElementById('printButton');
        const fileInputAnalisador = document.getElementById('spedFileAnalisador');

        fileInputAnalisador.addEventListener('change', handleFileSelectAnalisador);
        analyzeButton.addEventListener('click', runAnalysis);

        async function handleFileSelectAnalisador(event) {
            const file = event.target.files[0]; if (!file) return;
            statusAnalisador.textContent = `Carregando: ${file.name}...`;
            resultsAnalisador.innerHTML = ''; summaryAnalisador.innerHTML = ''; dashboardAnalisador.style.display = 'none'; analyzeButton.disabled = true; printButton.style.display = 'none';
            
            // Carrega o arquivo de regras
            try {
                const response = await fetch('rules.json');
                if (!response.ok) throw new Error('Falha ao carregar o arquivo de regras (rules.json).');
                validationRules = await response.json();
            } catch (error) {
                statusAnalisador.textContent = 'Erro crítico: Não foi possível carregar as regras de validação. Verifique se o arquivo "rules.json" está na mesma pasta.';
                console.error(error);
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                fileLinesAnalisador = e.target.result.split(/\r\n|\n/);
                const line0000 = fileLinesAnalisador.find(line => line.startsWith('|0000|'));
                if (line0000) {
                    populateDashboard(line0000);
                    dashboardAnalisador.style.display = 'block';
                    statusAnalisador.textContent = `Arquivo "${file.name}" carregado. Pronto para análise com ${validationRules.length} regras.`;
                    analyzeButton.disabled = false;
                } else { statusAnalisador.textContent = 'Erro: Arquivo SPED inválido ou não encontrado.'; }
            };
            reader.readAsText(file, 'latin1');
        }
        
        function populateDashboard(line0000) { /* Lógica inalterada */ 
            const fields = line0000.split('|');
            const formatDate = (d) => d ? `${d.substring(0,2)}/${d.substring(2,4)}/${d.substring(4)}` : 'N/A';
            const dashboardData = { 'Razão Social': fields[6], 'CNPJ': fields[7] ? fields[7].replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5') : 'N/A', 'Período': `${formatDate(fields[4])} a ${formatDate(fields[5])}`, 'UF': fields[9], 'IE': fields[10], 'Perfil': `Perfil ${fields[14]}` };
            let html = '<h3><span class="info-title">Dashboard do Arquivo</span></h3><div class="dashboard-grid">';
            for (const key in dashboardData) { html += `<div class="dashboard-item"><strong>${key}:</strong> ${dashboardData[key]}</div>`; }
            html += '</div>';
            dashboardAnalisador.innerHTML = html;
        }

        async function runAnalysis() {
            if (fileLinesAnalisador.length === 0 || validationRules.length === 0) return;
            statusAnalisador.textContent = 'Analisando... Por favor, aguarde.'; analyzeButton.disabled = true; printButton.style.display = 'none';
            
            // Simula o processamento assíncrono para não travar a UI
            setTimeout(async () => {
                try {
                    const errors = await analyzeSpedFile(fileLinesAnalisador, validationRules);
                    statusAnalisador.textContent = `Análise concluída. Foram encontrados ${errors.length} problemas.`;
                    displayResults(errors);
                    if (errors.length > 0) {
                        printButton.style.display = 'inline-block';
                    }
                } catch (e) {
                    statusAnalisador.textContent = 'Ocorreu um erro inesperado durante a análise.';
                    console.error("Erro na análise:", e);
                } finally {
                    analyzeButton.disabled = false;
                }
            }, 50);
        }

        // --- MOTOR DE ANÁLISE v3.5 ---
        async function analyzeSpedFile(lines, rules) {
            let errors = [];
            const context = {
                participants: new Set(),
                usedParticipants: new Map(),
                itemMap: new Map(),
                documents: new Map(),
                tanksState: new Map(),
                line0000: lines[0].split('|'),
                lines: lines,
            };

            // FASE 1: Coleta de dados (pré-processamento)
            // Esta fase prepara o contexto para as regras dinâmicas
            lines.forEach((line, index) => {
                const fields = line.split('|');
                const recordType = fields[1];
                if (recordType === '0150') context.participants.add(fields[2]);
                if (recordType === '0200') context.itemMap.set(fields[2], fields[3]);
                if (recordType === 'C100' && fields[4] && !context.usedParticipants.has(fields[4])) {
                    context.usedParticipants.set(fields[4], { lineNumber: index + 1, line });
                }
            });
            
            // FASE 2: Aplicação dinâmica das regras
            lines.forEach((line, index) => {
                if (!line) return;
                const fields = line.split('|');
                const recordType = fields[1];

                rules.filter(rule => rule.registro === recordType).forEach(rule => {
                    let conditionMet = false;
                    // Lógica de avaliação da regra (simplificada para demonstração)
                    if (rule.id === 'ERR-001') {
                        if (!validarIE(fields[rule.campo_idx], fields[9])) conditionMet = true;
                    }
                    if (rule.id === 'ERR-002') {
                        if (!context.participants.has(fields[rule.campo_idx])) conditionMet = true;
                    }
                    // Outras regras seriam avaliadas aqui...

                    if (conditionMet) {
                        errors.push({
                            recordType: recordType,
                            type: rule.tipo,
                            title: rule.titulo,
                            line: index + 1,
                            rawLine: line,
                            problematicField: { index: rule.campo_idx },
                            content: `Código: ${fields[rule.campo_idx]}`,
                            description: rule.descricao,
                            correction: rule.sugestao
                        });
                    }
                });
            });

            return errors;
        }

        // --- FUNÇÕES AUXILIARES DE VALIDAÇÃO ---
        const parseFloatSped = (str) => parseFloat((str || "0").replace(',', '.')) || 0;
        const formatDate = (dateStr) => dateStr ? `${dateStr.substring(0,2)}/${dateStr.substring(2,4)}/${dateStr.substring(4)}` : '';
        function validarIE(ie, uf) { /* Lógica inalterada */ 
            if (!ie || !uf || ie.toLowerCase() === 'isento' || ie.trim() === '') return true;
            const ieNumeros = ie.replace(/\D/g, ''); if (!ieNumeros) return true;
            if (uf === 'BA') {
                if (ieNumeros.length !== 8 && ieNumeros.length !== 9) return false;
                const mod = ([6, 7, 9].includes(parseInt(ieNumeros[ieNumeros.length === 8 ? 0 : 1]))) ? 11 : 10;
                let peso = ieNumeros.length === 8 ? 7 : 8; let soma = 0;
                for (let i = 0; i < ieNumeros.length - 2; i++) { soma += parseInt(ieNumeros[i]) * (peso - i); }
                let d2 = mod === 0 ? 0 : mod - (soma % mod); if (d2 >= 10) d2 = 0;
                if (parseInt(ieNumeros[ieNumeros.length - 1]) !== d2) return false;
                soma = 0; peso = ieNumeros.length === 8 ? 8 : 9;
                for (let i = 0; i < ieNumeros.length - 2; i++) { soma += parseInt(ieNumeros[i]) * (peso - i); }
                soma += d2 * 2;
                let d1 = mod === 0 ? 0 : mod - (soma % mod); if (d1 >= 10) d1 = 0;
                return parseInt(ieNumeros[ieNumeros.length - 2]) === d1;
            }
            return true;
        }

        function displayResults(errors) { /* Lógica inalterada */ 
            resultsAnalisador.innerHTML = '<h2>Relatório de Análise</h2>';
            if (errors.length === 0) {
                resultsAnalisador.innerHTML += '<div class="info-card"><div class="title info-title">Análise Concluída</div><div class="details">Nenhum erro crítico ou inconsistência encontrados!</div></div>';
                summaryAnalisador.innerHTML = ''; return;
            }
            const groupedErrors = errors.reduce((acc, error) => {
                const key = `Registro ${error.recordType || 'Geral'}`;
                if (!acc[key]) acc[key] = [];
                acc[key].push(error);
                return acc;
            }, {});
            let totalCritical = 0, totalWarning = 0;
            const sortedKeys = Object.keys(groupedErrors).sort();
            sortedKeys.forEach(recordTypeKey => {
                const groupErrors = groupedErrors[recordTypeKey];
                const hasCritical = groupErrors.some(e => e.type === 'CRITICAL');
                let criticalCount = 0, warningCount = 0;
                let detailsHTML = '';
                groupErrors.forEach(error => {
                    if (error.type === 'CRITICAL') criticalCount++; else warningCount++;
                    let highlightedLine = '';
                    if (error.rawLine) {
                        const fields = error.rawLine.split('|');
                        if (error.problematicField && fields[error.problematicField.index]) {
                            fields[error.problematicField.index] = `<span class="highlight">${fields[error.problematicField.index]}</span>`;
                        }
                        highlightedLine = fields.join('|');
                    }
                    detailsHTML += `
                        <div class="${error.type === 'CRITICAL' ? 'error-card' : 'warning-card'}">
                            <div class="${error.type === 'CRITICAL' ? 'error-title' : 'warning-title'}">${error.title}</div>
                            <div class="details">
                                <strong>Linha:</strong> ${error.line}<br>
                                ${error.content ? `<strong>Contexto:</strong> ${error.content}<br>` : ''}
                                <strong>Descrição do Problema:</strong> ${error.description}
                            </div>
                            ${error.rawLine ? `<div class="raw-line-container"><strong>Linha do Erro:</strong><br>${highlightedLine}</div>` : ''}
                            <div class="correction"><strong>Sugestão de Correção:</strong> ${error.correction}</div>
                        </div>`;
                });
                totalCritical += criticalCount;
                totalWarning += warningCount;
                resultsAnalisador.innerHTML += `
                    <div class="accordion-header ${hasCritical ? 'error' : 'warning'}" onclick="toggleAccordion('details-${recordTypeKey.replace(/ /g, '')}')">
                        <strong>${recordTypeKey}:</strong> 
                        <span style="color: #c0392b;">${criticalCount} Erro(s)</span> | 
                        <span style="color: #d35400;">${warningCount} Advertência(s)</span>
                    </div>
                    <div class="accordion-details" id="details-${recordTypeKey.replace(/ /g, '')}">
                        ${detailsHTML}
                    </div>
                `;
            });
            summaryAnalisador.innerHTML = `<strong style="font-size:1.2em;">Resumo Geral:</strong> <span style="color: #c0392b; font-weight:bold;">${totalCritical} Erro(s) Crítico(s)</span> | <span style="color: #d35400; font-weight:bold;">${totalWarning} Advertência(s)</span>`;
        }

        function toggleAccordion(id) { /* Lógica inalterada */ 
            const element = document.getElementById(id);
            if (element) {
                element.style.display = element.style.display === 'block' ? 'none' : 'block';
            }
        }
    </script>
</body>
</html>
