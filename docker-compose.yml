
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "15435:15435"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
